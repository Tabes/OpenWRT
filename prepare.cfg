#!/bin/ash
### BPI-R4 Vorbereitungsskript ###
### Installiert Pakete und lädt Konfigurationsdateien ###
### Execute as root via SSH / Console ###

set -e

echo "=== BPI-R4 Vorbereitung startet ==="

### === SPEICHER CHECK === ###
AVAILABLE_SPACE=$(df /tmp | tail -1 | awk '{print $4}')
if [ "$AVAILABLE_SPACE" -lt 50000 ]; then
    echo "WARNUNG: Wenig Speicher verfügbar: ${AVAILABLE_SPACE}KB"
    read -p "Trotzdem fortfahren? (y/N): " CONTINUE
    if [ "$CONTINUE" != "y" ] && [ "$CONTINUE" != "Y" ]; then
        echo "Installation abgebrochen"
        exit 1
    fi
fi

### === REPOSITORY VERFÜGBARKEIT CHECK === ###
echo "Prüfe Repository-Verfügbarkeit..."
if ! wget -q --spider http://downloads.openwrt.org/ --timeout=10; then
    echo "WARNUNG: OpenWrt Repository nicht erreichbar"
    echo "Internetverbindung oder DNS-Problem möglich"
    read -p "Trotzdem fortfahren? (y/N): " CONTINUE
    if [ "$CONTINUE" != "y" ] && [ "$CONTINUE" != "Y" ]; then
        echo "Installation abgebrochen - prüfen Sie Ihre Internetverbindung"
        exit 1
    fi
    echo "Versuche trotzdem fortzufahren..."
fi

### === PAKET REPOSITORY UPDATE === ###
echo "Aktualisiere Paket-Listen..."
opkg update

### === GRUNDLEGENDE PAKETE === ###
echo "Installiere grundlegende Pakete..."
opkg install wget curl nano htop iperf3

### === WIFI 7 PAKETE === ###
echo "Installiere WiFi 7 Pakete..."
opkg install kmod-mt7996 mt7996-firmware
opkg install hostapd-openssl wpa-supplicant-openssl
opkg install iw iwinfo wireless-tools

### === 5G MODEM PAKETE === ###
echo "Installiere 5G Modem Pakete..."
opkg install kmod-usb-serial-option kmod-usb-serial-qualcomm
opkg install comgt usb-modeswitch kmod-mii kmod-usb-net
opkg install kmod-usb-net-cdc-mbim kmod-usb-net-cdc-ncm kmod-usb-net-cdc-ether
opkg install kmod-usb-net-qmi-wwan uqmi luci-proto-qmi
opkg install kmod-usb-net-rndis kmod-usb-serial-wwan kmod-usb-wdm

### === NETZWERK TOOLS === ###
echo "Installiere Netzwerk-Tools..."
opkg install tcpdump nmap netcat socat
opkg install iptables-mod-extra kmod-ipt-extra

### === LUCI WEB INTERFACE === ###
echo "Installiere LuCI Web Interface..."
opkg install luci luci-ssl-openssl
opkg install luci-app-firewall luci-mod-admin-full
opkg install luci-app-opkg luci-base luci-mod-network
opkg install luci-proto-qmi luci-app-commands

### === MONITORING UND DEBUG === ###
echo "Installiere Monitoring Tools..."
opkg install bind-tools ca-certificates ca-bundle

### === LADE KONFIGURATIONSDATEIEN === ###
echo "Lade Konfigurationsdateien von GitHub..."
GITHUB_REPO="https://raw.githubusercontent.com/Tabes/OpenWRT/refs/heads/main"
cd /tmp

if wget -O interface.cfg "$GITHUB_REPO/interface.cfg"; then
    chmod +x interface.cfg
    echo "interface.cfg erfolgreich geladen"
else
    echo "FEHLER: interface.cfg konnte nicht geladen werden"
    exit 1
fi

if wget -O network.cfg "$GITHUB_REPO/network.cfg"; then
    chmod +x network.cfg
    echo "network.cfg erfolgreich geladen"
else
    echo "WARNUNG: network.cfg konnte nicht geladen werden"
fi

### === ERSTELLE HILFSSKRIPTE === ###
echo "Erstelle Hilfsskripte..."

# Netzwerk Status Skript
cat > /root/network_status.sh << 'EOF'
#!/bin/ash
echo "=== NETWORK STATUS ==="
echo "Interface Status:"
ip addr show | grep -E "(br-wan|br-lan|wlan)"
echo ""
echo "WiFi Status:" 
iwconfig 2>/dev/null | grep -E "(IEEE|ESSID|Mode)"
echo ""
echo "5G Modem Status:"
if [ -e /dev/cdc-wdm0 ]; then
    uqmi -d /dev/cdc-wdm0 --get-signal-info 2>/dev/null || echo "Modem nicht bereit"
else
    echo "5G Modem nicht erkannt"
fi
echo ""
echo "Routing Table:"
ip route show
EOF
chmod +x /root/network_status.sh

# WiFi Scan Skript
cat > /root/wifi_scan.sh << 'EOF'
#!/bin/ash
echo "=== WIFI SCAN ==="
for radio in radio0 radio1 radio2; do
    echo "Scanning $radio:"
    iw dev | grep -A 5 "$radio" || echo "$radio nicht aktiv"
done
EOF
chmod +x /root/wifi_scan.sh

# 5G Modem Test Skript
cat > /root/modem_test.sh << 'EOF'
#!/bin/ash
echo "=== 5G MODEM TEST ==="
if [ -e /dev/cdc-wdm0 ]; then
    echo "Modem erkannt: /dev/cdc-wdm0"
    echo "Signal Info:"
    uqmi -d /dev/cdc-wdm0 --get-signal-info
    echo "System Info:"
    uqmi -d /dev/cdc-wdm0 --get-system-info
else
    echo "5G Modem nicht erkannt"
    echo "Verfügbare USB Geräte:"
    lsusb
fi
EOF
chmod +x /root/modem_test.sh

### === SYSTEM SERVICES ENABLE === ###
echo "Aktiviere System Services..."
/etc/init.d/uhttpd enable
/etc/init.d/dropbear enable
/etc/init.d/dnsmasq enable
/etc/init.d/firewall enable
/etc/init.d/network enable

echo ""
echo "=== VORBEREITUNG ABGESCHLOSSEN ==="
echo "Konfigurationsdateien verfügbar in /tmp/"
echo "Hilfsskripte erstellt in /root/"
echo ""
echo "Nächste Schritte:"
echo "1. /tmp/interface.cfg ausführen (Basis-Konfiguration)"
echo "2. /tmp/network.cfg ausführen (WiFi 7 + 5G Erweiterungen)"
echo ""
echo "System Neustart empfohlen vor Konfiguration:"
echo "  reboot"