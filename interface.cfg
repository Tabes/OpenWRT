#!/bin/ash
### BPI-R4 Clean Slate Router Configuration Script ###
### Deletes all network configs and rebuilds from scratch ###
### Execute as root via SSH ###

set -e  ### Exit on any error ###

echo "Starting BPI-R4 clean slate configuration..."

### === BACKUP CURRENT CONFIGURATION === ###

echo "Creating configuration backup..."
mkdir -p /root/backup-$(date +%Y%m%d-%H%M)
uci export network > /root/backup-$(date +%Y%m%d-%H%M)/network.txt
uci export dhcp > /root/backup-$(date +%Y%m%d-%H%M)/dhcp.txt  
uci export firewall > /root/backup-$(date +%Y%m%d-%H%M)/firewall.txt
echo "Backup saved to /root/backup-$(date +%Y%m%d-%H%M)/"

### === CLEAN SLATE - DELETE ALL CONFIGS === ###

echo "Removing all network interfaces..."

### Delete all network interfaces ###
uci delete network.lan 2>/dev/null || true
uci delete network.wan 2>/dev/null || true
uci delete network.wan6 2>/dev/null || true

### Delete all devices and bridges ###
while uci delete network.@device[0] 2>/dev/null; do :; done

### Delete all DHCP configurations ###
uci delete dhcp.lan 2>/dev/null || true
uci delete dhcp.wan 2>/dev/null || true
while uci delete dhcp.@dhcp[0] 2>/dev/null; do :; done

### Delete all firewall zones ###
while uci delete firewall.@zone[0] 2>/dev/null; do :; done

### Delete all firewall rules ###
while uci delete firewall.@rule[0] 2>/dev/null; do :; done

### Delete all firewall forwardings ###
while uci delete firewall.@forwarding[0] 2>/dev/null; do :; done

echo "All old configurations removed!"

### === BUILD NEW CONFIGURATION FROM SCRATCH === ###

### === NETWORK DEVICES (BRIDGES) === ###

### WAN Bridge Device ###
### Single port bridge for upstream connection ###
uci set network.device_wan=device
uci set network.device_wan.name='br-wan'
uci set network.device_wan.type='bridge'
uci set network.device_wan.ports='lan0'
uci set network.device_wan.macaddr='16:e1:77:cc:58:45'

### LAN Bridge Device ###
### Multi-port bridge for internal network ###
uci set network.device_lan=device
uci set network.device_lan.name='br-lan'
uci set network.device_lan.type='bridge'
uci set network.device_lan.ports='lan1 lan2 lan3'
uci set network.device_lan.macaddr='2e:20:46:23:26:dc'

### === NETWORK INTERFACES === ###

### WAN Interface Configuration ###
### Gets IP from upstream OpnSense router ###
uci set network.wan=interface
uci set network.wan.proto='dhcp'
uci set network.wan.device='br-wan'
uci set network.wan.hostname='BPI-R4-Router'
uci set network.wan.macaddr='16:e1:77:cc:58:45'

### LAN Interface Configuration ###
### Static IP for internal network ###
uci set network.lan=interface
uci set network.lan.proto='static'
uci set network.lan.device='br-lan'
uci set network.lan.ipaddr='192.168.10.1'
uci set network.lan.netmask='255.255.255.0'

### Loopback Interface ###
### Always needed for system operation ###
uci set network.loopback=interface
uci set network.loopback.ifname='lo'
uci set network.loopback.proto='static'
uci set network.loopback.ipaddr='127.0.0.1'
uci set network.loopback.netmask='255.0.0.0'

### === DHCP CONFIGURATION === ###

### DHCP Settings ###
### Basic DNS and DHCP daemon configuration ###
uci set dhcp.@dnsmasq[0]=dnsmasq
uci set dhcp.@dnsmasq[0].domainneeded='1'
uci set dhcp.@dnsmasq[0].boguspriv='1'
uci set dhcp.@dnsmasq[0].filterwin2k='0'
uci set dhcp.@dnsmasq[0].localise_queries='1'
uci set dhcp.@dnsmasq[0].rebind_protection='1'
uci set dhcp.@dnsmasq[0].rebind_localhost='1'
uci set dhcp.@dnsmasq[0].local='/lan/'
uci set dhcp.@dnsmasq[0].domain='lan'
uci set dhcp.@dnsmasq[0].expandhosts='1'
uci set dhcp.@dnsmasq[0].nonegcache='0'
uci set dhcp.@dnsmasq[0].authoritative='1'
uci set dhcp.@dnsmasq[0].readethers='1'
uci set dhcp.@dnsmasq[0].leasefile='/tmp/dhcp.leases'
uci set dhcp.@dnsmasq[0].resolvfile='/tmp/resolv.conf.d/resolv.conf.auto'

### DHCP Pool for LAN ###
### IP range for internal clients ###
uci set dhcp.lan=dhcp
uci set dhcp.lan.interface='lan'
uci set dhcp.lan.start='50'
uci set dhcp.lan.limit='200'
uci set dhcp.lan.leasetime='12h'
uci set dhcp.lan.dhcpv4='server'
uci set dhcp.lan.dhcpv6='server'
uci set dhcp.lan.ra='server'

### WAN DHCP Settings ###
### Disable DHCP server on WAN ###
uci set dhcp.wan=dhcp
uci set dhcp.wan.interface='wan'
uci set dhcp.wan.ignore='1'

### === FIREWALL CONFIGURATION === ###

### Firewall Defaults ###
### Basic firewall behavior ###
uci set firewall.@defaults[0]=defaults
uci set firewall.@defaults[0].input='REJECT'
uci set firewall.@defaults[0].output='ACCEPT'
uci set firewall.@defaults[0].forward='REJECT'
uci set firewall.@defaults[0].synflood_protect='1'

### WAN Zone ###
### External/Internet facing zone ###
uci set firewall.wan_zone=zone
uci set firewall.wan_zone.name='wan'
uci set firewall.wan_zone.input='REJECT'
uci set firewall.wan_zone.output='ACCEPT'
uci set firewall.wan_zone.forward='REJECT'
uci set firewall.wan_zone.masq='1'
uci set firewall.wan_zone.mtu_fix='1'
uci set firewall.wan_zone.network='wan'

### LAN Zone ###
### Internal trusted zone ###
uci set firewall.lan_zone=zone
uci set firewall.lan_zone.name='lan'
uci set firewall.lan_zone.input='ACCEPT'
uci set firewall.lan_zone.output='ACCEPT'
uci set firewall.lan_zone.forward='ACCEPT'
uci set firewall.lan_zone.network='lan'

### LAN to WAN Forwarding ###
### Allow internal clients to access internet ###
uci set firewall.lan_to_wan=forwarding
uci set firewall.lan_to_wan.src='lan'
uci set firewall.lan_to_wan.dest='wan'

### === WAN MANAGEMENT ACCESS === ###

### SSH Access from WAN ###
### Management access from upstream network ###
uci set firewall.ssh_wan=rule
uci set firewall.ssh_wan.name='Allow-SSH-from-Upstream'
uci set firewall.ssh_wan.src='wan'
uci set firewall.ssh_wan.proto='tcp'
uci set firewall.ssh_wan.dest_port='22'
uci set firewall.ssh_wan.target='ACCEPT'

### HTTP Access from WAN ###
### Web interface from upstream network ###
uci set firewall.http_wan=rule
uci set firewall.http_wan.name='Allow-HTTP-from-Upstream'
uci set firewall.http_wan.src='wan'
uci set firewall.http_wan.proto='tcp'
uci set firewall.http_wan.dest_port='80'
uci set firewall.http_wan.target='ACCEPT'

### HTTPS Access from WAN ###
### Secure web interface from upstream network ###
uci set firewall.https_wan=rule
uci set firewall.https_wan.name='Allow-HTTPS-from-Upstream'
uci set firewall.https_wan.src='wan'
uci set firewall.https_wan.proto='tcp'
uci set firewall.https_wan.dest_port='443'
uci set firewall.https_wan.target='ACCEPT'

### === SSH AND WEB INTERFACE === ###

### SSH Configuration ###
### SSH daemon settings ###
uci set dropbear.@dropbear[0].Interface=''
uci set dropbear.@dropbear[0].Port='22'
uci set dropbear.@dropbear[0].PasswordAuth='on'
uci set dropbear.@dropbear[0].RootPasswordAuth='on'

### Web Interface Configuration ###
### LuCI accessible from all interfaces ###
uci set uhttpd.main.listen_http='0.0.0.0:80'
uci set uhttpd.main.listen_https='0.0.0.0:443'

### === COMMIT AND APPLY CONFIGURATION === ###

echo "Committing all configuration changes..."
uci commit

echo "Restarting all network services..."
/etc/init.d/network restart
sleep 5

/etc/init.d/firewall restart
sleep 2

/etc/init.d/dropbear restart
sleep 2

/etc/init.d/uhttpd restart
sleep 2

/etc/init.d/dnsmasq restart

echo ""
echo "=== CLEAN SLATE CONFIGURATION COMPLETED ==="
echo "WAN Interface: br-wan (MAC: 16:e1:77:cc:58:45)"
echo "LAN Interface: 192.168.10.1/24"
echo "DHCP Range: 192.168.10.50-250"
echo "Management access enabled via WAN interface"
echo ""
echo "Configuration backup saved to /root/backup-$(date +%Y%m%d-%H%M)/"
echo ""
echo "Please check WAN IP: ip addr show br-wan"
echo "Please check LAN connectivity from a client device"