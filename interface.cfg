#!/bin/ash
### BPI-R4 Clean Slate Router Configuration Script ###
### Deletes all Network Configs and Rebuilds from Scratch ###
### Execute as root via SSH ###

set -e  ### Exit on any error ###

echo "Starting complete interface cleanup..."

### === BACKUP CURRENT CONFIGURATION === ###

echo "Creating complete backup..."
mkdir -p /root/backup/$(date +%Y%m%d-%H%M)
uci export network > /root/backup/$(date +%Y%m%d-%H%M)/network-full.txt
uci export dhcp > /root/backup/$(date +%Y%m%d-%H%M)/dhcp-full.txt
uci export wireless > /root/backup/$(date +%Y%m%d-%H%M)/wireless-full.txt 2>/dev/null || true
echo "Backup saved to /root/backup/$(date +%Y%m%d-%H%M)/"

### === DYNAMIC INTERFACE DELETION === ###

echo "Scanning and deleting all network interfaces..."

### Get list of all interface sections ###
INTERFACES=$(uci show network | grep "network\." | grep "=interface" | cut -d'.' -f2 | cut -d'=' -f1 | sort -u)

### Delete each interface found ###
for iface in $INTERFACES; do
    echo "Deleting interface: $iface"
    uci delete network.$iface 2>/dev/null || true
done

echo "Scanning and deleting all device sections..."

### Get list of all device sections ###
DEVICES=$(uci show network | grep "network\." | grep "=device" | cut -d'.' -f2 | cut -d'=' -f1 | sort -u)

### Delete each device found ###
for device in $DEVICES; do
    echo "Deleting device: $device"
    uci delete network.$device 2>/dev/null || true
done

### Delete any remaining anonymous sections ###
echo "Cleaning up anonymous sections..."

### Delete all @device sections ###
while uci delete network.@device[0] 2>/dev/null; do
    echo "Deleted anonymous device section"
done

### Delete all @interface sections ###
while uci delete network.@interface[0] 2>/dev/null; do
    echo "Deleted anonymous interface section"
done

### Delete all switch and switch_vlan sections ###
while uci delete network.@switch[0] 2>/dev/null; do
    echo "Deleted switch section"
done

while uci delete network.@switch_vlan[0] 2>/dev/null; do
    echo "Deleted switch_vlan section"
done

### Delete all switch_port sections ###
while uci delete network.@switch_port[0] 2>/dev/null; do
    echo "Deleted switch_port section"
done

### === DELETE DHCP INTERFACES === ###

echo "Cleaning up DHCP interface configurations..."

### Get list of all DHCP sections ###
DHCP_SECTIONS=$(uci show dhcp | grep "dhcp\." | grep "=dhcp" | cut -d'.' -f2 | cut -d'=' -f1 | sort -u)

### Delete each DHCP section found ###
for dhcp_iface in $DHCP_SECTIONS; do
    echo "Deleting DHCP config: $dhcp_iface"
    uci delete dhcp.$dhcp_iface 2>/dev/null || true
done

### Delete anonymous DHCP sections ###
while uci delete dhcp.@dhcp[0] 2>/dev/null; do
    echo "Deleted anonymous DHCP section"
done

### === CREATE MINIMAL LOOPBACK === ###

echo "Creating minimal loopback interface..."

### Loopback is essential for system operation ###
uci set network.loopback=interface
uci set network.loopback.ifname='lo'
uci set network.loopback.proto='static'
uci set network.loopback.ipaddr='127.0.0.1'
uci set network.loopback.netmask='255.0.0.0'

### === SHOW CLEANUP RESULTS === ###

echo ""
echo "=== CLEANUP COMPLETED ==="
echo ""
echo "Remaining network sections:"
uci show network 2>/dev/null || echo "No network sections remaining"

echo ""
echo "Remaining DHCP sections:"
uci show dhcp 2>/dev/null || echo "No DHCP sections remaining"

### === COMMIT WITHOUT RESTART === ###

echo ""
echo "Committing changes (NOT restarting network yet)..."
uci commit network
uci commit dhcp

echo ""
echo "=== ALL INTERFACES DELETED ==="
echo "Only loopback interface remains"
echo ""
echo "Configuration backup saved to /root/backup/$(date +%Y%m%d-%H%M)/"
echo ""
echo "WARNING: Network connectivity may be lost!"
echo "Run your interface.cfg script immediately to restore connectivity"
echo ""
echo "To restart network manually: /etc/init.d/network restart"