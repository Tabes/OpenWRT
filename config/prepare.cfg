#!/bin/ash
### BPI-R4 Preparation Script ###
### Installs Packages and download Configuration Files ###
### Execute as root via SSH / Console ###

set -e  ### Exit on any error ###

echo "=== BPI-R4 Preparation starting ==="

### === STORAGE CHECK === ###
AVAILABLE_SPACE=$(df /tmp | tail -1 | awk '{print $4}')

if [ "$AVAILABLE_SPACE" -lt 50000 ]; then
    echo "WARNING: Low storage space available: ${AVAILABLE_SPACE}KB"
    read -p "Continue anyway? (y/N): " CONTINUE
    
    if [ "$CONTINUE" != "y" ] && [ "$CONTINUE" != "Y" ]; then
        echo "Installation aborted"
        exit 1
    fi

fi

### === LOAD CONFIGURATION FILES === ###
echo "Loading configuration files from GitHub..."
GITHUB_REPO="https://raw.githubusercontent.com/Tabes/OpenWRT/refs/heads/main"
cd /tmp

if wget -O interface.cfg "$GITHUB_REPO/interface.cfg"; then
    chmod +x interface.cfg
    echo "interface.cfg successfully loaded"
else
    echo "ERROR: interface.cfg could not be loaded"
    exit 1
fi

if wget -O network.cfg "$GITHUB_REPO/network.cfg"; then
    chmod +x network.cfg
    echo "network.cfg successfully loaded"
else
    echo "WARNING: network.cfg could not be loaded"
fi

### === CREATE HELPER SCRIPTS === ###
echo "Creating helper scripts..."

### Network Status Script ###
cat > /root/network_status.sh << 'EOF'
#!/bin/ash
echo "=== NETWORK STATUS ==="
echo "Interface Status:"
ip addr show | grep -E "(br-wan|br-lan|wlan)"
echo ""
echo "WiFi Status:" 
iwconfig 2>/dev/null | grep -E "(IEEE|ESSID|Mode)"
echo ""
echo "5G Modem Status:"

if [ -e /dev/cdc-wdm0 ]; then
    uqmi -d /dev/cdc-wdm0 --get-signal-info 2>/dev/null || echo "Modem not ready"
else
    echo "5G Modem not detected"
fi

echo ""
echo "Routing Table:"
ip route show
EOF
chmod +x /root/network_status.sh

### WiFi Scan Script ###
cat > /root/wifi_scan.sh << 'EOF'
#!/bin/ash
echo "=== WIFI SCAN ==="

for radio in radio0 radio1 radio2; do
    echo "Scanning $radio:"
    iw dev | grep -A 5 "$radio" || echo "$radio not active"
done

EOF
chmod +x /root/wifi_scan.sh

### 5G Modem Test Script ###
cat > /root/modem_test.sh << 'EOF'
#!/bin/ash
echo "=== 5G MODEM TEST ==="

if [ -e /dev/cdc-wdm0 ]; then
    echo "Modem detected: /dev/cdc-wdm0"
    echo "Signal Info:"
    uqmi -d /dev/cdc-wdm0 --get-signal-info
    echo "System Info:"
    uqmi -d /dev/cdc-wdm0 --get-system-info
else
    echo "5G Modem not detected"
    echo "Available USB devices:"
    lsusb
fi

EOF
chmod +x /root/modem_test.sh

### === ENABLE SYSTEM SERVICES === ###
echo "Enabling system services..."
/etc/init.d/uhttpd enable
/etc/init.d/dropbear enable
/etc/init.d/dnsmasq enable
/etc/init.d/firewall enable
/etc/init.d/network enable

echo ""
echo "=== PREPARATION COMPLETED ==="
echo "Configuration files available in /tmp/"
echo "Helper scripts created in /root/"
echo ""
echo "Next steps:"
echo "1. Execute /tmp/interface.cfg (Basic configuration)"
echo "2. Execute /tmp/network.cfg (WiFi 7 + 5G extensions)"
echo ""
echo "System restart recommended before configuration:"
echo "  reboot"